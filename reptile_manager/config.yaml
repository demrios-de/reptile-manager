name: "Reptile Manager"
version: "1.2.1"
slug: "reptile_manager"
description: "Haltungsmanagement für Reptilien — Fütterungen, Häutungen, Zucht, Stammbaum & Home Assistant Integration"
url: "https://github.com/demrios-de/reptile-manager"
documentation: "https://github.com/demrios-de/reptile-manager/blob/main/README.md"
codenotice: "MIT License — demrios-de"

arch:
  - aarch64
  - amd64
  - armv7
  - armhf

init: false

ingress: true
