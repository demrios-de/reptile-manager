panel_icon: "mdi:snake"
panel_title: "Reptile Manager"
panel_admin: false

ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Backend API (direkt, für api_url Option)"

map:
  - data:rw

options:
  admin_username: "admin"
  admin_password: "admin123"
  secret_key: ""
  api_url: ""

schema:
  admin_username: "str"
  admin_password: "str"
  secret_key: "str?"
  api_url: "str?"
